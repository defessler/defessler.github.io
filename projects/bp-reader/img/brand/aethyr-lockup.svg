<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 380" width="1120" height="380" role="img" aria-label="Aethyr">
  <title>Aethyr</title>
  <desc>Cyan crystal mark with the AETHYR wordmark and a particle weave on a deep void field.</desc>
  <!-- AETHYR master lockup. Palette per STYLE_GUIDE.md :root tokens. Cyan-led, white wordmark, void black. -->
  <defs>
    <radialGradient id="gemAura"><stop offset="0%" stop-color="#1ce6ff" stop-opacity=".40"/><stop offset="55%" stop-color="#1ce6ff" stop-opacity=".10"/><stop offset="100%" stop-color="#1ce6ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="leak"><stop offset="0%" stop-color="#9b6bff" stop-opacity=".16"/><stop offset="45%" stop-color="#1ce6ff" stop-opacity=".06"/><stop offset="100%" stop-color="#1ce6ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="coreGlow"><stop offset="0%" stop-color="#ffffff" stop-opacity=".85"/><stop offset="45%" stop-color="#bff7ff" stop-opacity=".30"/><stop offset="100%" stop-color="#bff7ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokehCyan"><stop offset="0%" stop-color="#1ce6ff" stop-opacity=".42"/><stop offset="55%" stop-color="#1ce6ff" stop-opacity=".14"/><stop offset="100%" stop-color="#1ce6ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokehViolet"><stop offset="0%" stop-color="#9b6bff" stop-opacity=".42"/><stop offset="55%" stop-color="#9b6bff" stop-opacity=".14"/><stop offset="100%" stop-color="#9b6bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokehWhite"><stop offset="0%" stop-color="#e8ecff" stop-opacity=".38"/><stop offset="55%" stop-color="#e8ecff" stop-opacity=".12"/><stop offset="100%" stop-color="#e8ecff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokehMag"><stop offset="0%" stop-color="#ff2bd6" stop-opacity=".34"/><stop offset="55%" stop-color="#ff2bd6" stop-opacity=".12"/><stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="0" y="0" width="1120" height="380" fill="#070710"/>
  <ellipse cx="270" cy="185" rx="150" ry="190" fill="url(#gemAura)"/>
  <ellipse cx="400" cy="190" rx="220" ry="150" fill="url(#leak)"/>

  <!-- crystal -->
  <g>
    <polygon points="270,46 215,110 270,110" fill="#16c4ec"/>
    <polygon points="270,54 232,98 270,98" fill="#aef2ff" opacity=".55"/>
    <polygon points="270,46 270,110 325,110" fill="#0e8fc0"/>
    <polygon points="215,110 180,150 270,150 270,110" fill="#1ce6ff" opacity=".92"/>
    <polygon points="325,110 270,110 270,150 360,150" fill="#16c4ec"/>
    <polygon points="180,150 270,150 270,236 225,236" fill="#0e6ea8"/>
    <polygon points="270,150 360,150 315,236 270,236" fill="#0a4f80"/>
    <polygon points="225,236 270,236 270,322" fill="#083b62"/>
    <polygon points="270,236 315,236 270,322" fill="#0a4a78"/>
    <g stroke="#1ce6ff" stroke-width="1" opacity=".35">
      <line x1="215" y1="110" x2="325" y2="110"/>
      <line x1="180" y1="150" x2="360" y2="150"/>
      <line x1="225" y1="236" x2="315" y2="236"/>
    </g>
    <ellipse cx="270" cy="130" rx="20" ry="34" fill="url(#coreGlow)"/>
    <g filter="url(#glow)" opacity=".9"><path d="M270,116 L272,130 L270,150 L268,130 Z" fill="#ffffff"/><path d="M256,131 L270,129 L284,131 L270,133 Z" fill="#ffffff" opacity=".7"/></g>
    <g filter="url(#glow)">
      <polygon points="270,46 360,150 270,322 180,150" fill="none" stroke="#1ce6ff" stroke-width="2.2"/>
      <line x1="270" y1="46" x2="270" y2="322" stroke="#cdf6ff" stroke-width="2"/>
      <line x1="300" y1="80" x2="330" y2="120" stroke="#9b6bff" stroke-width="1.5" opacity=".6"/>
      <line x1="240" y1="80" x2="212" y2="118" stroke="#ff2bd6" stroke-width="1.5" opacity=".5"/>
      <line x1="350" y1="152" x2="335" y2="170" stroke="#ff8a4c" stroke-width="1.2" opacity=".45"/>
    </g>
  </g>

  <!-- particle weave -->
  <g>
    <polygon points="372,144 380,152 369,154" fill="#1ce6ff" opacity=".85"/>
    <polygon points="392,124 398,131 389,132" fill="#e8ecff" opacity=".70"/>
    <polygon points="400,200 407,208 396,209" fill="#9b6bff" opacity=".60"/>
    <polygon points="422,160 431,169 419,170" fill="#1ce6ff" opacity=".75"/>
    <polygon points="440,118 445,124 437,125" fill="#e8ecff" opacity=".60"/>
    <polygon points="454,222 460,229 450,230" fill="#ff2bd6" opacity=".50"/>
    <polygon points="472,148 480,157 469,158" fill="#1ce6ff" opacity=".70"/>
    <polygon points="496,184 503,191 493,192" fill="#e8ecff" opacity=".60"/>
    <polygon points="516,132 522,139 513,140" fill="#1ce6ff" opacity=".60"/>
    <polygon points="560,208 566,215 556,216" fill="#9b6bff" opacity=".45"/>
    <polygon points="602,138 609,146 598,147" fill="#1ce6ff" opacity=".50"/>
    <polygon points="662,200 668,207 658,208" fill="#e8ecff" opacity=".45"/>
    <polygon points="722,150 727,156 719,157" fill="#ff2bd6" opacity=".40"/>
    <polygon points="782,206 788,213 778,214" fill="#1ce6ff" opacity=".45"/>
    <polygon points="842,160 847,166 839,167" fill="#e8ecff" opacity=".40"/>
    <polygon points="922,200 928,207 918,208" fill="#1ce6ff" opacity=".40"/>
    <polygon points="982,150 988,157 978,158" fill="#9b6bff" opacity=".40"/>
    <polygon points="1042,182 1047,188 1038,189" fill="#e8ecff" opacity=".35"/>
  </g>

  <!-- blueprint-wire nod: right-angle elbows + typed pins -->
  <g>
    <polyline points="506,168 540,168 540,196" fill="none" stroke="#1ce6ff" stroke-width="1.4" stroke-linecap="round" opacity=".40"/>
    <circle cx="506" cy="168" r="2.4" fill="#1ce6ff" opacity=".55"/>
    <circle cx="540" cy="196" r="2.4" fill="#ff2bd6" opacity=".55"/>
    <polyline points="700,182 730,182 730,160" fill="none" stroke="#9b6bff" stroke-width="1.4" stroke-linecap="round" opacity=".35"/>
    <circle cx="700" cy="182" r="2.2" fill="#9b6bff" opacity=".50"/>
    <circle cx="730" cy="160" r="2.2" fill="#1ce6ff" opacity=".50"/>
  </g>

  <!-- wordmark: custom monoline caps, delta A, open R. White, no fill color. -->
  <g filter="url(#glow)" fill="none" stroke="#eef1ff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M509,150 L486,222 M509,150 L532,222"/>
    <path d="M592,150 L592,222 M592,150 L634,150 M592,186 L628,186 M592,222 L634,222"/>
    <path d="M694,150 L740,150 M717,150 L717,222"/>
    <path d="M800,150 L800,222 M842,150 L842,222 M800,186 L842,186"/>
    <path d="M904,150 L925,186 M946,150 L925,186 M925,186 L925,222"/>
    <path d="M1008,150 L1008,222 M1008,150 L1042,150 M1044,150 L1044,186 M1044,186 L1016,186 M1024,186 L1050,222"/>
  </g>

  <!-- foreground bokeh -->
  <circle cx="92" cy="300" r="34" fill="url(#bokehCyan)"/>
  <circle cx="1044" cy="88" r="28" fill="url(#bokehViolet)"/>
  <circle cx="150" cy="92" r="20" fill="url(#bokehWhite)"/>
  <circle cx="1002" cy="312" r="26" fill="url(#bokehMag)"/>
</svg>
