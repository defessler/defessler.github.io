<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 24 320 320" width="320" height="320" role="img" aria-label="Aethyr">
  <title>Aethyr</title>
  <desc>Cyan faceted crystal mark with a central vertical cut, lit from within, on a deep void field.</desc>
  <!-- AETHYR crystal mark (standalone). App icon / favicon source. Crystal only, transparent background. -->
  <defs>
    <radialGradient id="gemAura"><stop offset="0%" stop-color="#1ce6ff" stop-opacity=".42"/><stop offset="55%" stop-color="#1ce6ff" stop-opacity=".12"/><stop offset="100%" stop-color="#1ce6ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="coreGlow"><stop offset="0%" stop-color="#ffffff" stop-opacity=".85"/><stop offset="45%" stop-color="#bff7ff" stop-opacity=".30"/><stop offset="100%" stop-color="#bff7ff" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <ellipse cx="270" cy="185" rx="150" ry="190" fill="url(#gemAura)"/>
  <g>
    <polygon points="270,46 215,110 270,110" fill="#16c4ec"/>
    <polygon points="270,54 232,98 270,98" fill="#aef2ff" opacity=".55"/>
    <polygon points="270,46 270,110 325,110" fill="#0e8fc0"/>
    <polygon points="215,110 180,150 270,150 270,110" fill="#1ce6ff" opacity=".92"/>
    <polygon points="325,110 270,110 270,150 360,150" fill="#16c4ec"/>
    <polygon points="180,150 270,150 270,236 225,236" fill="#0e6ea8"/>
    <polygon points="270,150 360,150 315,236 270,236" fill="#0a4f80"/>
    <polygon points="225,236 270,236 270,322" fill="#0a4a72"/>
    <polygon points="270,236 315,236 270,322" fill="#0a4a78"/>
    <g stroke="#1ce6ff" stroke-width="1" opacity=".35">
      <line x1="215" y1="110" x2="325" y2="110"/>
      <line x1="180" y1="150" x2="360" y2="150"/>
      <line x1="225" y1="236" x2="315" y2="236"/>
    </g>
    <ellipse cx="270" cy="130" rx="20" ry="34" fill="url(#coreGlow)"/>
    <g filter="url(#glow)" opacity=".9"><path d="M270,116 L272,130 L270,150 L268,130 Z" fill="#ffffff"/><path d="M256,131 L270,129 L284,131 L270,133 Z" fill="#ffffff" opacity=".7"/></g>
    <g filter="url(#glow)">
      <polygon points="270,46 360,150 270,322 180,150" fill="none" stroke="#1ce6ff" stroke-width="5" stroke-linejoin="round"/>
      <line x1="270" y1="46" x2="270" y2="322" stroke="#cdf6ff" stroke-width="3"/>
      <line x1="300" y1="80" x2="330" y2="120" stroke="#9b6bff" stroke-width="1.5" opacity=".6"/>
      <line x1="240" y1="80" x2="212" y2="118" stroke="#ff2bd6" stroke-width="1.5" opacity=".5"/>
    </g>
  </g>
</svg>
